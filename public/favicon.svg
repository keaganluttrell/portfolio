<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2d48a"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#9f7625"/>
    </linearGradient>
    <linearGradient id="coinEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2d48a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9f7625" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#coin)" stroke="url(#coinEdge)" stroke-width="0.5"/>
  <circle cx="16" cy="16" r="11" fill="none" stroke="#f2d48a" stroke-width="0.4" opacity="0.5"/>
  <circle cx="13.5" cy="13.5" r="4" fill="#0a1628" opacity="0.12"/>
</svg>
