<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Keagan Luttrell coin mark">
  <defs>
    <linearGradient id="coin" x1="4" y1="3" x2="28" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff1b8"/>
      <stop offset="0.32" stop-color="#f2d48a"/>
      <stop offset="0.62" stop-color="#d4a843"/>
      <stop offset="1" stop-color="#8b611b"/>
    </linearGradient>
    <linearGradient id="edge" x1="6" y1="5" x2="26" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff5c8"/>
      <stop offset="0.52" stop-color="#c08b2d"/>
      <stop offset="1" stop-color="#6f4613"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="38%" cy="30%" r="68%">
      <stop offset="0" stop-color="#fff4bf" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#f2d48a" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#6f4613" stop-opacity="0.28"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- Outer ring on navy -->
  <circle cx="16" cy="16" r="15" fill="#07111f"/>
  <circle cx="16" cy="16" r="14" fill="url(#coin)" filter="url(#shadow)"/>

  <!-- Rim tick marks -->
  <g opacity="0.5" stroke="#fff1b8" stroke-width="1" stroke-linecap="round">
    <path d="M16 2.6v3.2M16 26.2v3.2M2.6 16h3.2M26.2 16h3.2M6.3 6.3l2.3 2.3M23.4 23.4l2.3 2.3M25.7 6.3l-2.3 2.3M8.6 23.4l-2.3 2.3"/>
  </g>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="11.5" fill="url(#innerGlow)" stroke="url(#edge)" stroke-width="1.2"/>
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#7b5018" stroke-opacity="0.3" stroke-width="0.7"/>

  <!-- "kl" monogram — bold, readable at 16x16 -->
  <text x="16" y="17.5" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-weight="700" font-size="7.5" fill="#07111f" opacity="0.88">kl</text>
  <text x="16" y="17.2" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-weight="700" font-size="7.5" fill="#fff4bf" opacity="0.18">kl</text>
</svg>
